# /etc/nginx/sites-available/manage-v2.cylonix.io
#
# Front for the cylonix-manage-v2 docker compose stack:
#   /manager/v2/...   →  cylonix-manager API   (host 8081 → container 8080)
#   /ws/...           →  websocket logs        (host 8071 → container 8070)
#   /<headscale path> →  headscale HTTP+noise  (host 8082 → container 8000)
#   everything else   →  cylonix-manager-ui    (host 8090 → container 8001)
#
# Initial form is HTTP-only. After `certbot --nginx -d manage-v2.cylonix.io`
# runs, certbot inserts the listen 443 ssl block + the HTTP→HTTPS redirect
# automatically.

# Map Upgrade header → Connection value (websocket / noise upgrade support).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Custom access_log format that drops the query string. Use for paths that
# may carry credentials in the URL (the manager API's legacy /login GET).
log_format manager_v2_no_query
    '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name manage-v2.cylonix.io;

    client_max_body_size 16m;

    # ----- cylonix-manager-ui (catch-all SPA) -----
    # Anything that isn't a manager / websocket / headscale path lands here.
    # The UI's internal nginx serves /index.html for unknown paths so SPA
    # routing keeps working.
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 600s;
    }

    # ----- cylonix-manager API -----
    # Login endpoints are logged with the no-query format so any credential
    # accidentally placed in a URL doesn't end up in the access log.
    location = /manager/v2/login {
        access_log /var/log/nginx/access.log manager_v2_no_query;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 600s;
    }
    location ^~ /manager/v2/login/ {
        access_log /var/log/nginx/access.log manager_v2_no_query;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 600s;
    }
    location ^~ /manager/v2/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 600s;
    }

    # ----- websocket log streams -----
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:8071;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering off;
    }

    # ----- headscale endpoints -----
    # Tailscale clients hit /ts2021 (noise), /key, /machine/*, /derp*, /register/*.
    # Browsers hit /oidc/callback and the platform configs (/apple, /windows).
    # Operators may hit /health, /version, /swagger, /verify, /robots.txt,
    # /bootstrap-dns. Each gets routed to headscale rather than the UI SPA.
    location ~ ^/(ts2021|key|health|version|verify|robots\.txt|bootstrap-dns|windows)$ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        # /machine/map and /ts2021 hold open for many minutes.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    location ~ ^/(machine|register|oidc|derp|apple|swagger)(/|$) {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }
}
